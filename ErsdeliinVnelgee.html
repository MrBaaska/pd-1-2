<!DOCTYPE html>
<html lang="mn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Эрсдэлийн үнэлгээ</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0d1117;
            --surface: #161b22;
            --surface2: #1c2330;
            --border: #30363d;
            --accent: #3fb950;
            --accent-glow: rgba(63, 185, 80, 0.15);
            --accent-dim: rgba(63, 185, 80, 0.6);
            --danger: #f85149;
            --warn: #e3b341;
            --text: #e6edf3;
            --text-muted: #8b949e;
            --text-dim: #484f58;
            --radius: 10px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'DM Sans', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 40px 20px;
            background-image:
                radial-gradient(ellipse 60% 40% at 70% 0%, rgba(63,185,80,0.06) 0%, transparent 60%),
                radial-gradient(ellipse 40% 30% at 10% 80%, rgba(63,185,80,0.04) 0%, transparent 50%);
        }

        .wrapper {
            width: 100%;
            max-width: 540px;
        }

        /* ── Header ── */
        .header {
            margin-bottom: 28px;
            animation: fadeDown 0.5s ease both;
        }

        .header-badge {
            display: inline-flex;
            align-items: center;
            gap: 7px;
            font-family: 'DM Mono', monospace;
            font-size: 11px;
            color: var(--accent);
            background: var(--accent-glow);
            border: 1px solid rgba(63,185,80,0.25);
            padding: 4px 10px;
            border-radius: 20px;
            margin-bottom: 14px;
            letter-spacing: 0.05em;
        }

        .header-badge::before {
            content: '';
            width: 6px; height: 6px;
            border-radius: 50%;
            background: var(--accent);
            box-shadow: 0 0 8px var(--accent);
            animation: pulse 2s infinite;
        }

        .header h1 {
            font-size: 26px;
            font-weight: 600;
            letter-spacing: -0.5px;
            color: var(--text);
        }

        .header p {
            color: var(--text-muted);
            font-size: 13.5px;
            margin-top: 5px;
            font-weight: 300;
        }

        /* ── Card ── */
        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 28px;
            animation: fadeUp 0.5s ease 0.1s both;
        }

        /* ── Form fields ── */
        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .form-group.full { grid-column: 1 / -1; }

        label {
            font-size: 12px;
            font-weight: 500;
            color: var(--text-muted);
            letter-spacing: 0.04em;
            text-transform: uppercase;
        }

        input, textarea, select {
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            font-size: 14px;
            padding: 10px 13px;
            width: 100%;
            transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
            outline: none;
            appearance: none;
            -webkit-appearance: none;
        }

        input::placeholder, textarea::placeholder { color: var(--text-dim); }

        input:focus, textarea:focus, select:focus {
            border-color: var(--accent-dim);
            background: #1e2a20;
            box-shadow: 0 0 0 3px var(--accent-glow);
        }

        textarea {
            resize: vertical;
            min-height: 88px;
            line-height: 1.55;
        }

        /* Select arrow */
        .select-wrap { position: relative; }
        .select-wrap::after {
            content: '▾';
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            pointer-events: none;
            font-size: 13px;
        }
        select { cursor: pointer; padding-right: 32px; }
        select option { background: var(--surface2); }

        /* ── Risk badges ── */
        .risk-pills {
            display: flex;
            gap: 8px;
        }

        .risk-pill {
            flex: 1;
            padding: 9px 0;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: var(--surface2);
            color: var(--text-muted);
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            text-align: center;
            transition: all 0.2s;
            user-select: none;
        }

        .risk-pill:hover { border-color: var(--text-dim); color: var(--text); }

        .risk-pill[data-level="их"].active    { background: rgba(248,81,73,0.12); border-color: var(--danger); color: var(--danger); }
        .risk-pill[data-level="дунд"].active  { background: rgba(227,179,65,0.12); border-color: var(--warn); color: var(--warn); }
        .risk-pill[data-level="бага"].active  { background: var(--accent-glow); border-color: var(--accent); color: var(--accent); }

        .risk-pill[data-level="их"] .dot    { background: var(--danger); }
        .risk-pill[data-level="дунд"] .dot  { background: var(--warn); }
        .risk-pill[data-level="бага"] .dot  { background: var(--accent); }

        .pill-inner { display: flex; align-items: center; justify-content: center; gap: 6px; }
        .dot { width: 7px; height: 7px; border-radius: 50%; opacity: 0.5; transition: opacity 0.2s; }
        .risk-pill.active .dot { opacity: 1; }

        /* Hidden select keeps form working */
        #riskLevel { display: none; }

        /* ── Submit ── */
        .submit-btn {
            width: 100%;
            margin-top: 18px;
            padding: 13px;
            background: var(--accent);
            color: #0d1117;
            font-family: 'DM Sans', sans-serif;
            font-size: 14.5px;
            font-weight: 600;
            border: none;
            border-radius: var(--radius);
            cursor: pointer;
            transition: opacity 0.2s, transform 0.15s, box-shadow 0.2s;
            letter-spacing: 0.01em;
        }

        .submit-btn:hover:not(:disabled) {
            opacity: 0.9;
            box-shadow: 0 0 18px rgba(63,185,80,0.35);
        }

        .submit-btn:active:not(:disabled) { transform: scale(0.99); }

        .submit-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* ── Message ── */
        #message {
            display: none;
            margin-top: 14px;
            padding: 11px 14px;
            border-radius: var(--radius);
            font-size: 13.5px;
            font-weight: 500;
            animation: fadeUp 0.3s ease both;
        }

        .success {
            background: rgba(63,185,80,0.1);
            border: 1px solid rgba(63,185,80,0.3);
            color: var(--accent);
        }

        .error {
            background: rgba(248,81,73,0.1);
            border: 1px solid rgba(248,81,73,0.3);
            color: var(--danger);
        }

        /* ── Divider ── */
        .divider {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 24px 0 20px;
            color: var(--text-dim);
            font-size: 11px;
            font-family: 'DM Mono', monospace;
            letter-spacing: 0.06em;
        }
        .divider::before, .divider::after {
            content: ''; flex: 1; height: 1px; background: var(--border);
        }

        /* ── History ── */
        .history-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 14px;
        }

        .history-title {
            font-size: 13px;
            font-weight: 600;
            color: var(--text);
        }

        .history-count {
            font-family: 'DM Mono', monospace;
            font-size: 11px;
            color: var(--accent);
            background: var(--accent-glow);
            border: 1px solid rgba(63,185,80,0.2);
            padding: 2px 8px;
            border-radius: 20px;
        }

        .submission-empty {
            color: var(--text-dim);
            font-size: 13.5px;
            text-align: center;
            padding: 20px 0;
        }

        .submission-list { list-style: none; display: flex; flex-direction: column; gap: 10px; }

        .submission-item {
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 13px 15px;
            font-size: 13px;
            line-height: 1.65;
            position: relative;
            transition: border-color 0.2s;
        }

        .submission-item:hover { border-color: var(--text-dim); }

        .item-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 8px;
        }

        .item-name {
            font-weight: 600;
            font-size: 13.5px;
            color: var(--text);
        }

        .item-time {
            font-family: 'DM Mono', monospace;
            font-size: 11px;
            color: var(--text-dim);
        }

        .item-body { display: flex; flex-direction: column; gap: 3px; color: var(--text-muted); }

        .item-row { display: flex; gap: 5px; }
        .item-label { color: var(--text-dim); min-width: 80px; }

        .risk-tag {
            display: inline-block;
            font-size: 11px;
            font-weight: 600;
            padding: 1px 8px;
            border-radius: 20px;
            vertical-align: middle;
        }

        .risk-tag.их   { background: rgba(248,81,73,0.12); color: var(--danger); border: 1px solid rgba(248,81,73,0.3); }
        .risk-tag.дунд { background: rgba(227,179,65,0.12); color: var(--warn); border: 1px solid rgba(227,179,65,0.3); }
        .risk-tag.бага { background: var(--accent-glow); color: var(--accent); border: 1px solid rgba(63,185,80,0.3); }

        /* ── Animations ── */
        @keyframes fadeDown {
            from { opacity: 0; transform: translateY(-12px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(10px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        /* ── Responsive ── */
        @media (max-width: 480px) {
            .form-grid { grid-template-columns: 1fr; }
            .form-group.full { grid-column: 1; }
        }
    </style>
</head>
<body>

<div class="wrapper">
    <div class="header">
        <div class="header-badge">АЮУЛГҮЙ АЖИЛЛАГАА</div>
        <h1>Эрсдэлийн үнэлгээ</h1>
        <p>Илрүүлсэн үл тохирол болон эрсдэлийг бүртгэх</p>
    </div>

    <div class="card">
        <form id="surveyForm" method="POST">
            <div class="form-grid">
                <div class="form-group">
                    <label for="employeeName">Илрүүлсэн ажилтан</label>
                    <input type="text" id="employeeName" name="Ажилтаны нэр" placeholder="Нэрээ оруулна уу" required>
                </div>
                <div class="form-group">
                    <label for="location">Байршил</label>
                    <input type="text" id="location" name="Гэмтлийн байршил" placeholder="Байршил оруулна уу" required>
                </div>
                <div class="form-group full">
                    <label for="mismatch">Үл тохирол</label>
                    <textarea id="mismatch" name="Үл тохирол" placeholder="Үл тохирлын дэлгэрэнгүйг бичнэ үү..." required></textarea>
                </div>
                <div class="form-group full">
                    <label for="risk">Учирч болох эрсдэл</label>
                    <textarea id="risk" name="Эрсдэл" placeholder="Эрсдэлийн дэлгэрэнгүйг бичнэ үү..." required></textarea>
                </div>
                <div class="form-group full">
                    <label>Эрсдэлийн зэрэг</label>
                    <div class="risk-pills">
                        <div class="risk-pill" data-level="их">
                            <div class="pill-inner"><span class="dot"></span>Их</div>
                        </div>
                        <div class="risk-pill" data-level="дунд">
                            <div class="pill-inner"><span class="dot"></span>Дунд</div>
                        </div>
                        <div class="risk-pill" data-level="бага">
                            <div class="pill-inner"><span class="dot"></span>Бага</div>
                        </div>
                    </div>
                    <select id="riskLevel" name="Эрсдэлийн зэрэг" required>
                        <option value="" selected disabled></option>
                        <option value="их">Их</option>
                        <option value="дунд">Дунд</option>
                        <option value="бага">Бага</option>
                    </select>
                </div>
            </div>

            <button type="submit" id="submitBtn" class="submit-btn">Илгээх</button>
        </form>

        <div id="message"></div>

        <div class="divider">ӨНӨӨДРИЙН БҮРТГЭЛ</div>

        <div class="history-header">
            <span class="history-title">Илгээсэн мэдээлэл</span>
            <span class="history-count" id="historyCount">0</span>
        </div>
        <div id="submissionHistory"></div>
    </div>
</div>

<script>
    const scriptURL = 'https://script.google.com/macros/s/AKfycbw-kk-VYGiDJucIFUL7cqu6bc-ZBLFA0U7Iw9QRnEGJTDj-LUUoDgK3T3YSxzvH_Mko/exec';
    const storageKey = 'dailyRiskSurveySubmissions';
    const form = document.getElementById('surveyForm');
    const msg = document.getElementById('message');
    const btn = document.getElementById('submitBtn');
    const submissionHistory = document.getElementById('submissionHistory');
    const historyCount = document.getElementById('historyCount');
    form.action = scriptURL;

    // Risk pill selection
    const pills = document.querySelectorAll('.risk-pill');
    const riskSelect = document.getElementById('riskLevel');

    pills.forEach(pill => {
        pill.addEventListener('click', () => {
            pills.forEach(p => p.classList.remove('active'));
            pill.classList.add('active');
            riskSelect.value = pill.dataset.level;
        });
    });

    function getTodayKey() {
        const d = new Date();
        return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
    }

    function loadTodaySubmissions() {
        try {
            const saved = localStorage.getItem(storageKey);
            if (!saved) return [];
            const parsed = JSON.parse(saved);
            if (parsed.date !== getTodayKey()) { localStorage.removeItem(storageKey); return []; }
            return Array.isArray(parsed.entries) ? parsed.entries : [];
        } catch { localStorage.removeItem(storageKey); return []; }
    }

    function saveTodaySubmissions(entries) {
        localStorage.setItem(storageKey, JSON.stringify({ date: getTodayKey(), entries }));
    }

    function escapeHtml(v) {
        return String(v).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
    }

    function syncHiddenFields() {
        let submittedAtInput = form.querySelector('input[name="огноо"]');

        if (!submittedAtInput) {
            submittedAtInput = document.createElement('input');
            submittedAtInput.type = 'hidden';
            submittedAtInput.name = 'огноо';
            form.appendChild(submittedAtInput);
        }

        submittedAtInput.value = new Date().toISOString();
    }

    function renderSubmissions() {
        const entries = loadTodaySubmissions();
        historyCount.textContent = entries.length;

        if (!entries.length) {
            submissionHistory.innerHTML = '<p class="submission-empty">Өнөөдөр илгээсэн мэдээлэл алга.</p>';
            return;
        }

        const items = [...entries].reverse().map((e, i) => `
            <li class="submission-item">
                <div class="item-header">
                    <span class="item-name">${escapeHtml(e.employeeName)}</span>
                    <span class="item-time">${escapeHtml(e.submittedAt)}</span>
                </div>
                <div class="item-body">
                    <div class="item-row"><span class="item-label">Байршил:</span><span>${escapeHtml(e.location)}</span></div>
                    <div class="item-row"><span class="item-label">Үл тохирол:</span><span>${escapeHtml(e.mismatch)}</span></div>
                    <div class="item-row"><span class="item-label">Эрсдэл:</span><span>${escapeHtml(e.risk)}</span></div>
                    <div class="item-row"><span class="item-label">Зэрэг:</span><span class="risk-tag ${escapeHtml(e.riskLevel)}">${escapeHtml(e.riskLevel).toUpperCase()}</span></div>
                </div>
            </li>`).join('');

        submissionHistory.innerHTML = `<ol class="submission-list">${items}</ol>`;
    }

    renderSubmissions();

    form.addEventListener('submit', async e => {
        e.preventDefault();

        if (!riskSelect.value) {
            msg.innerHTML = '⚠️ Эрсдэлийн зэргийг сонгоно уу.';
            msg.className = 'error';
            msg.style.display = 'block';
            return;
        }

        btn.disabled = true;
        btn.innerHTML = 'Илгээж байна…';
        msg.style.display = 'none';

        const entry = {
            employeeName: document.getElementById('employeeName').value.trim(),
            location: document.getElementById('location').value.trim(),
            mismatch: document.getElementById('mismatch').value.trim(),
            risk: document.getElementById('risk').value.trim(),
            riskLevel: riskSelect.value,
            submittedAt: new Date().toLocaleTimeString('mn-MN', { hour: '2-digit', minute: '2-digit' })
        };

        syncHiddenFields();

        try {
            const formData = new FormData(form);
            formData.set('огноо', new Date().toISOString());

            const response = await fetch(scriptURL, {
                method: 'POST',
                body: new URLSearchParams(formData),
                redirect: 'follow'
            });

            if (!response.ok) {
                throw new Error(`HTTP ${response.status}`);
            }

            const resultText = await response.text();
            let result;

            try {
                result = JSON.parse(resultText);
            } catch {
                throw new Error('Сервер буруу хариу буцаалаа.');
            }

            if (result.result !== 'success') {
                throw new Error(result.message || 'Google Sheets рүү хадгалж чадсангүй.');
            }

            const entries = loadTodaySubmissions();
            entries.push(entry);
            saveTodaySubmissions(entries);
            renderSubmissions();
            msg.innerHTML = `✓ Хүсэлт амжилттай илгээгдлээ. Мөр №${result.row ?? '—'}`;
            msg.className = 'success';
            msg.style.display = 'block';
            form.reset();
            pills.forEach(p => p.classList.remove('active'));
            btn.disabled = false;
            btn.innerHTML = 'Дахин илгээх';
        } catch (error) {
            msg.innerHTML = `✕ Илгээх үед алдаа гарлаа: ${error.message}`;
            msg.className = 'error';
            msg.style.display = 'block';
            btn.disabled = false;
            btn.innerHTML = 'Илгээх';
        }
    });
</script>

</body>
</html>
